name: Deploy to GitHub Pages

on:
  # Сборка и деплой при пуше в main
  push:
    branches: [main]
  # Возможность запустить вручную из вкладки Actions
  workflow_dispatch:

# Права, необходимые для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем один конкурентный деплой; не отменяем уже идущий прод-деплой
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # withastro/action сам определяет пакетный менеджер (npm),
        # ставит зависимости, запускает `astro build` и загружает
        # артефакт Pages из каталога ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
