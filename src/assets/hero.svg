<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d4aff"/>
      <stop offset="1" stop-color="#a838ff"/>
    </linearGradient>
    <linearGradient id="hw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- панель -->
  <rect x="0.5" y="0.5" width="399" height="299" rx="22" fill="url(#panel)" stroke="#e0d9f7"/>

  <!-- коннекторы гипервизор -> ВМ -->
  <g stroke="#b9a9ff" stroke-width="2">
    <line x1="78"  y1="118" x2="78"  y2="150"/>
    <line x1="200" y1="118" x2="200" y2="150"/>
    <line x1="322" y1="118" x2="322" y2="150"/>
  </g>

  <!-- три виртуальные машины -->
  <g>
    <!-- VM 1 -->
    <rect x="30"  y="44" width="96" height="74" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="30"  y="44" width="96" height="18" rx="10" fill="#ede9fe"/>
    <rect x="30"  y="53" width="96" height="9"  fill="#ede9fe"/>
    <circle cx="42" cy="53" r="3" fill="#ef4444"/><circle cx="52" cy="53" r="3" fill="#f59e0b"/><circle cx="62" cy="53" r="3" fill="#22c55e"/>
    <rect x="42" y="74"  width="72" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="42" y="86"  width="56" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="42" y="98"  width="64" height="6" rx="3" fill="#e2e8f0"/>
    <!-- VM 2 -->
    <rect x="152" y="44" width="96" height="74" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="152" y="44" width="96" height="18" rx="10" fill="#ede9fe"/>
    <rect x="152" y="53" width="96" height="9"  fill="#ede9fe"/>
    <circle cx="164" cy="53" r="3" fill="#ef4444"/><circle cx="174" cy="53" r="3" fill="#f59e0b"/><circle cx="184" cy="53" r="3" fill="#22c55e"/>
    <rect x="164" y="74"  width="72" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="164" y="86"  width="56" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="164" y="98"  width="64" height="6" rx="3" fill="#e2e8f0"/>
    <!-- VM 3 -->
    <rect x="274" y="44" width="96" height="74" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="274" y="44" width="96" height="18" rx="10" fill="#ede9fe"/>
    <rect x="274" y="53" width="96" height="9"  fill="#ede9fe"/>
    <circle cx="286" cy="53" r="3" fill="#ef4444"/><circle cx="296" cy="53" r="3" fill="#f59e0b"/><circle cx="306" cy="53" r="3" fill="#22c55e"/>
    <rect x="286" y="74"  width="72" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="286" y="86"  width="56" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="286" y="98"  width="64" height="6" rx="3" fill="#e2e8f0"/>
  </g>

  <!-- гипервизор -->
  <rect x="30" y="150" width="340" height="40" rx="11" fill="url(#accent)"/>
  <text x="200" y="175" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700" letter-spacing="3">ГИПЕРВИЗОР</text>

  <!-- оборудование -->
  <rect x="30" y="206" width="340" height="64" rx="12" fill="url(#hw)"/>
  <!-- чип -->
  <rect x="170" y="222" width="60" height="32" rx="5" fill="#1e1b4b" stroke="#7c6cff" stroke-width="1.5"/>
  <g stroke="#7c6cff" stroke-width="2">
    <line x1="180" y1="222" x2="180" y2="214"/><line x1="200" y1="222" x2="200" y2="214"/><line x1="220" y1="222" x2="220" y2="214"/>
    <line x1="180" y1="254" x2="180" y2="262"/><line x1="200" y1="254" x2="200" y2="262"/><line x1="220" y1="254" x2="220" y2="262"/>
  </g>
  <text x="200" y="242" text-anchor="middle" fill="#c7c2ff" font-size="9" font-weight="700" letter-spacing="1">CPU</text>
  <text x="92"  y="242" text-anchor="middle" fill="#a9a3e8" font-size="10" letter-spacing="2">ОБОРУДОВАНИЕ</text>
  <text x="312" y="242" text-anchor="middle" fill="#a9a3e8" font-size="10" letter-spacing="1">RAM · NIC · SSD</text>
</svg>
